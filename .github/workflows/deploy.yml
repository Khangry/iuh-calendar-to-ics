name: Deploy to Vercel

# Chỉ deploy production SAU KHI test + lint pass. Yêu cầu tắt auto Git-deploy
# của Vercel (đã set trong vercel.json: git.deploymentEnabled.main = false) để
# workflow này là đường deploy DUY NHẤT.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # cho phép bấm "Run workflow" chạy tay từ tab Actions

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn test
        env:
          ENCRYPTION_KEY: ci-test-secret-key
          CLIENT_SECRET: ci-test-secret

  # Bỏ qua deploy (không đỏ CI) nếu chưa cấu hình secret VERCEL_TOKEN.
  guard:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa set secret VERCEL_TOKEN -> bỏ qua deploy."
          fi

  deploy:
    needs: [test, guard]
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    # Vercel CLI tự đọc các biến này từ env (không cần cờ --token).
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull cấu hình Vercel
        run: vercel pull --yes --environment=production
      - name: Build
        run: vercel build --prod
      - name: Deploy production
        run: vercel deploy --prebuilt --prod
