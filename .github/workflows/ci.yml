name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: Test (input/output)
        run: yarn test
        env:
          ENCRYPTION_KEY: ci-test-secret-key
          CLIENT_SECRET: ci-test-secret
