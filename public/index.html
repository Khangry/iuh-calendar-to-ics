<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IUH Calendar to ICS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>IUH Calendar to ICS</h2>
      <p class="note">
        Đăng nhập bằng tài khoản sinh viên IUH (như app OneUni) để nhận link
        lịch học &amp; thi subscribe được vào Google/Apple Calendar. Không cần
        CAPTCHA. Mật khẩu được mã hoá, chỉ dùng để đăng nhập lấy lịch.
      </p>

      <form id="linkForm">
        <label for="mssv">
          Mã số sinh viên <span class="required">*</span>
        </label>
        <input id="mssv" type="text" placeholder="VD: 20001234" required />

        <label for="password">
          Mật khẩu <span class="required">*</span>
        </label>
        <input id="password" type="password" placeholder="Mật khẩu SV" required />

        <button type="submit" id="submitBtn">Tạo link lịch</button>
      </form>

      <div id="error"></div>

      <div id="result" style="display: none">
        <p id="greeting" class="note"></p>

        <label>Link subscribe (webcal — nhấn để thêm vào Calendar):</label>
        <a id="webcalLink" href="#"></a>
        <button type="button" id="copyWebcal">Copy link webcal</button>

        <label>Hoặc link https (dán vào "Add by URL"):</label>
        <input id="httpsLink" type="text" readonly />
        <button type="button" id="copyHttps">Copy link https</button>

        <div id="copied">Đã copy link vào clipboard!</div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
